services:
  - type: web
    name: college-erp
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn CollegeERP.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
